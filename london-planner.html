async function searchPlaygrounds() {
  const input = document.getElementById("pg-input");
  const query = input?.value?.trim();
  if (!query) { input?.focus(); return; }

  pgSearchState = "loading";
  renderPlaygrounds();

  try {
    const res = await fetch("https://london.antoinehubert0.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 800,
        messages: [{ role: "user", content: `Une famille française avec 2 enfants de 2 et 4 ans visite Londres. Ils cherchent des aires de jeux dans le quartier : "${query}".

Réponds UNIQUEMENT avec un tableau JSON valide, sans markdown ni backticks. Max 4 résultats. Structure :
[
  {
    "icon": "emoji",
    "name": "nom de l'aire de jeux ou du parc",
    "desc": "1-2 phrases : ce qu'il y a pour les petits et pourquoi c'est bien pour 2-4 ans",
    "transport": "distance ou transport depuis ${query}",
    "coords": "latitude,longitude format 51.XXXX,-0.XXXX"
  }
]` }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || "").join("").trim();
    const clean = text.replace(/```json|```/gi, "").trim();
    pgResults = JSON.parse(clean);
    pgSearchState = "done";
  } catch(e) {
    pgSearchState = "error";
  }
  renderPlaygrounds();
  // Scroll to results
  setTimeout(() => document.querySelector(".pg-result")?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
}

function switchDay(id) {
  activeDay = id;
  activeView = "planner";

  document.documentElement.style.setProperty("--day-color", DAYS.find(d => d.id === id).color);
  render();
  window.scrollTo(0, 0);
}

function toggleDone(id, e) {
  e.stopPropagation();
  done[id] = !done[id];
  saveDone();
  render();
}

function deleteCustom(id, e) {
  e.stopPropagation();
  if (!confirm("Supprimer cette activité ?")) return;
  customItems[activeDay] = (customItems[activeDay] || []).filter(i => i.id !== id);
  saveCustom();
  if (expanded === id) expanded = null;
  render();
}

  e.stopPropagation();
  const item = getDayItems().find(i => i.id === itemId);

  document.getElementById("modal-title").textContent = item.title;
  document.getElementById("modal-routes").innerHTML =
    item.routes.map((r, ri) => {

          <span class="modal-route-icon">${r.mode}</span>
          <span class="modal-route-name">${r.label}</span>
          <span class="modal-route-time" style="background:${day.color}">${r.duration}</span>

        <div class="modal-route-detail">${r.detail}</div>

        </div>
        <div class="ai-preview-desc">${pendingItem.desc}</div>
        ${pendingItem.routes.length ? `<div class="routes-title" style="margin-top:12px">Transport depuis l'hôtel</div>${routesHTML}` : ""}
        ${url ? `<a href="${url}" target="_blank" class="maps-btn" style="margin-top:10px" onclick="event.stopPropagation()">📍 Voir sur Google Maps</a>` : ""}
      </div>
      <button class="add-form-btn" onclick="confirmAdd()" style="background:${day.color}">
        ➕ Ajouter à ${day.emoji} ${day.label}
      </button>
      <button class="btn-secondary" onclick="openAdd()">← Recommencer</button>`;

  } else if (addState === "error") {
    c.innerHTML = `
      <div class="sheet-title">➕ Ajouter une activité</div>
      <div class="ai-error">😕 Impossible de générer la fiche. Vérifiez votre connexion et réessayez.</div>
      <button class="add-form-btn" onclick="openAdd()" style="background:${day.color};margin-top:14px">← Réessayer</button>`;
  }
}

async function generateActivity() {
  const input = document.getElementById("place-input");
  const place = input?.value?.trim();
  if (!place) { input?.focus(); return; }

  addState = "loading";
  renderAddSheet();

  const day = DAYS.find(d => d.id === activeDay);

  const prompt = `Tu es un assistant de voyage expert en Londres. Une famille française avec 2 enfants de 2 et 4 ans séjourne au "Leonardo Royal Hotel London Tower Bridge" (45 Prescot St, London E1 8GP, à Tower Hill) du 14 au 17 avril 2026.

Ils veulent ajouter "${place}" à leur programme du ${day.label} (${day.title}).

Réponds UNIQUEMENT avec un objet JSON valide, sans markdown, sans backticks, sans texte avant ou après. Structure exacte :
{
  "icon": "un seul emoji représentatif",
  "title": "nom court max 30 caractères",
  "desc": "2-3 phrases pour une famille avec jeunes enfants, mentionne ce qui plaira aux enfants et un conseil pratique",
  "price": "tarif adulte/enfant si applicable, sinon null",
  "reserve": true ou false,
  "dest": "adresse complète pour Google Maps",
  "coords": "latitude,longitude format '51.XXXX,-0.XXXX'",
  "routes": [
    {
      "mode": "emoji transport unique (🚇 ou 🚌 ou 🚶)",
      "label": "Métro ou Bus ou À pied",
      "detail": "trajet précis depuis Tower Hill avec lignes et arrêts",
      "duration": "ex: ~20 min",
      "price": "ex: Compris dans plafond ou 1,75 £ ou Gratuit"
    }
  ]
}

Inclus 1 ou 2 options de transport réalistes. Si à moins de 15 min à pied, inclus la marche.`;

  try {
    const res = await fetch("https://london.antoinehubert0.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content?.map(b => b.text || "").join("").trim();
    const clean = text.replace(/```json|```/gi, "").trim();
    const item = JSON.parse(clean);
    item.id = "custom_" + Date.now();

    pendingItem = item;
    addState = "preview";
    renderAddSheet();

  } catch(err) {
    console.error(err);
    addState = "error";
    renderAddSheet();
  }
}

function confirmAdd() {
  if (!pendingItem) return;
  if (!customItems[activeDay]) customItems[activeDay] = [];
  customItems[activeDay].push(pendingItem);
  saveCustom();
  closeAdd();
  render();
}

function rotateTip() {
  const el = document.getElementById("tip");
  el.style.opacity = "0";
  setTimeout(() => { tipIdx = (tipIdx + 1) % TIPS.length; el.textContent = TIPS[tipIdx]; el.style.opacity = "1"; }, 300);
}
document.getElementById("tip").textContent = TIPS[0];
setInterval(rotateTip, 4000);
window.addEventListener("popstate", closeModal);
render();
</script>
